<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  >

  <title>Control Pedidos</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #eef2f7;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
    }

    iframe {
      width: 100%;
      height: 100dvh;
      min-height: 100vh;
      border: none;
      display: block;
      background: #eef2f7;
    }

    @supports (-webkit-touch-callout: none) {
      iframe {
        height: -webkit-fill-available;
      }
    }
  </style>
</head>

<body>
  <iframe
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbyf973XQWJwIRURqQVBGGMQPfICkurYcHfLPQs6c1eNat22bo-hFdwna_i_uwhMldLX/exec"
    allow="camera; microphone; clipboard-read; clipboard-write"
    referrerpolicy="no-referrer-when-downgrade"
    title="Control Pedidos"
  ></iframe>
</body>
</html>
